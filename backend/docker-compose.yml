services:
  ipb-space-backend:
    build: .
    env_file:
      - .env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    container_name: ipb-space-backend
    ports:
      - "8000:8000"

    volumes:
      - .:/code

    depends_on:
      db:
        condition: service_healthy
    
    environment:
      - PYTHONPATH=/code

  db:
    image: postgres:16
    container_name: pg_db
    env_file:
      - .env
    # This maps your laptop's port to the container's port
    ports:
      - "5433:5432" #btw ganti jadi 5433, soalnya 5432 udh dipake di laptopku
    volumes:
      # Format: [Existing Volume Name] : [Path inside container]
      - pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  # Compose-managed named volume (auto-created on first `docker compose up`)
  pgdata:
    driver: local

