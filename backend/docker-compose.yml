services:
  dev: 
    build: .
    container_name: ipb_space_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:simpelaja1@db:5432/ipb-space-db
    depends_on:
      - db

  db:
    image: postgres:latest
    container_name: pg_db
    # This maps your laptop's port to the container's port
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=simpelaja1
      - POSTGRES_USER=postgres
      - POSTGRES_DB=ipb-space-db
    volumes:
      # Format: [Existing Volume Name] : [Path inside container]
      - pgdata:/var/lib/postgresql
    restart: always

volumes:
  # This tells Docker the volume already exists outside this file
  pgdata:
    external: true

